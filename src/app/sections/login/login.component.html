<div class="login-wrapper">
   

    <!-- Login Card -->
    <main class="main">
        <div class="login-card">
            <div class="login-card__inner">

                <div class="login-card__header">
                   
                    <h1 class="login-card__title">Welcome back</h1>
                    <p class="login-card__subtitle">Sign in with your Microsoft account to access the <strong>Master
                            Builders Solutions</strong> platform.</p>
                </div>

                <div class="login-card__body">
                    <button class="btn-microsoft">
                        <span class="btn-microsoft__logo" *ngIf="!isLoading">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <rect x="1" y="1" width="8.5" height="8.5" fill="#F25022" />
                                <rect x="10.5" y="1" width="8.5" height="8.5" fill="#7FBA00" />
                                <rect x="1" y="10.5" width="8.5" height="8.5" fill="#00A4EF" />
                                <rect x="10.5" y="10.5" width="8.5" height="8.5" fill="#FFB900" />
                            </svg>
                        </span>
                        <span class="btn-microsoft__spinner" *ngIf="isLoading">
                            <span class="spinner"></span>
                        </span>
                        <span class="btn-microsoft__text">
                            {{ isLoading ? 'Signing in...' : 'Sign in with Microsoft' }}
                        </span>
                    </button>

                    <div class="login-card__error" *ngIf="errorMessage">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="8" r="7" stroke="#c0392b" stroke-width="1.5" />
                            <path d="M8 4.5v4M8 11h.01" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round" />
                        </svg>
                        <span>{{ errorMessage }}</span>
                    </div>
                </div>

                <div class="login-card__footer">
                    <p>By signing in, you agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.
                    </p>
                </div>

            </div>

            <!-- Decorative side stripe -->
            <div class="login-card__stripe"></div>
        </div>

        
    </main>

</div>
