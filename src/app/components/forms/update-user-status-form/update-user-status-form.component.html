<button class="back-btn" (click)="goBack()">Back to Home</button>
<div class="main">
    <div class="form-container">

        <form [formGroup]="userStatusForm" (ngSubmit)="onSubmit()" class="voting-form">
            <div class="form-group">
                <label>User ID*</label>
                <input type="text" formControlName="userID" />
            </div>

            <div class="form-group">
                <label>User Status*</label>
                <div class="radio-buttons-container">
                    <div class="radio-label-container">
                        <input type="radio" formControlName="userStatus" value="active" />
                        <label for="active">Active</label>
                    </div>
                    <div class="radio-label-container">
                        <input type="radio" formControlName="userStatus" value="inactive" />
                        <label for="inactive">Inactive</label>
                    </div>
                </div>
            </div>

            <div class="button-container">
                <button type="submit" [disabled]="userStatusForm.invalid">Submit</button>
            </div>
        </form>
    </div>
</div>
