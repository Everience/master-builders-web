<button class="back-btn" (click)="goBack()">Back to Home</button>
<div class="main">
    <div class="form-container">

        <form [formGroup]="votingForm" (ngSubmit)="onSubmit()" class="voting-form">
            <div class="form-group">
                <label>Project ID*</label>
                <input type="text" formControlName="projectID" />
            </div>

            <div class="form-group">
                <label>Project Status*</label>
                <select formControlName="projectStatus">
                    <option value="">Select status</option>
                    <option *ngFor="let status of projectStatuses" [value]="status">{{ status }}</option>
                </select>
            </div>

            <div class="form-group">
                    <label>Project Visibility*</label>
                    <div class="radio-buttons-container">
                        <div class="radio-label-container">
                            <input type="radio" formControlName="projectVisibility" value="active" />
                            <label for="active">Active</label>
                        </div>
                        <div class="radio-label-container">
                            <input type="radio" formControlName="projectVisibility" value="inactive" />
                            <label for="inactive">Inactive</label>
                        </div>
                    </div>
            </div>

            <div class="button-container">
                <button type="submit" [disabled]="votingForm.invalid">Submit</button>
            </div>
        </form>
    </div>
</div>
